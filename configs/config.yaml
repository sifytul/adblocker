server:
  listen_address: "0.0.0.0:53"
  protocol: "udp"

upstream:
  servers:
    - "8.8.8.8:53"
    - "1.1.1.1:53"
    - "9.9.9.9:53"

  timeout: 3

blocklist:
  sources:
    - "blocklists/stevenblack.txt"
    - "blocklists/peter-lowe.txt"
    - "blocklists/custom.txt"
    - "blocklists/adult-blocking.txt"

logging:
  level: "info"
  log_queries: true
  log_blocked: true
  output_file: "logs/dns-query.log"

cache:
  enabled: true
  clean_interval: 300
